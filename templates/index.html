<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omikuji Info Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <div class="card">

        <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">

        <h1>Omikuji Info</h1>

        <p class="subtitle">
            Discord お知らせ管理システム
        </p>

        {% if message %}
        <div class="notice">
            {{ message }}
        </div>
        {% endif %}

        <form action="/sync" method="POST">
            <label>🔒 管理パスワード</label>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">
                🔄 サーバー・チャンネル同期
            </button>
        </form>

        <hr>

        <form action="/send" method="POST" enctype="multipart/form-data">
            <label>🔒 管理パスワード</label>
            <input type="password" name="password" placeholder="Password" required>

            <label>📢 送信先チャンネル（複数選択可）</label>

            <div class="server-list">
                {% for guild_name, guild_channels in channels|groupby("guild_name") %}
                <details class="server-box" open>
                    <summary>
                        {{ guild_name }}
                    </summary>

                    <div class="server-actions">
                        <button type="button" onclick="selectServer(this)">
                            このサーバーを全選択
                        </button>

                        <button type="button" onclick="clearServer(this)">
                            このサーバーを解除
                        </button>
                    </div>

                    <div class="channel-list">
                        {% for ch in guild_channels %}
                        <label class="channel-item">
                            <input
                                type="checkbox"
                                name="channel_ids"
                                value="{{ ch.channel_id }}">

                            <span>
                                #{{ ch.channel_name }}
                            </span>
                        </label>
                        {% endfor %}
                    </div>
                </details>
                {% endfor %}
            </div>

            <div class="global-actions">
                <button type="button" onclick="selectAll()">
                    全チャンネル選択
                </button>

                <button type="button" onclick="clearAll()">
                    全解除
                </button>
            </div>

            <label>📝 タイトル</label>
            <input type="text" name="title" placeholder="アップデートのお知らせ">

            <label>📄 本文</label>
            <textarea
                name="message"
                rows="8"
                placeholder="ここに本文を書いてください..."
                required></textarea>

            <label>🖼️ 画像添付</label>
            <input type="file" name="image" accept="image/*">

            <label>🎨 Embedカラー</label>
            <select name="color">
                <option value="3447003">🔵 Blue</option>
                <option value="3066993">🟢 Green</option>
                <option value="15158332">🔴 Red</option>
                <option value="16776960">🟡 Yellow</option>
            </select>

            <div class="check">
                <input type="checkbox" name="everyone" id="everyone">
                <label for="everyone">@everyone を付ける</label>
            </div>

            <button type="submit">
                🚀 Discordへ送信
            </button>
        </form>

    </div>
</div>

<script>
function selectAll(){
    document.querySelectorAll('input[name="channel_ids"]')
    .forEach(c => c.checked = true);
}

function clearAll(){
    document.querySelectorAll('input[name="channel_ids"]')
    .forEach(c => c.checked = false);
}

function selectServer(button){
    const serverBox = button.closest(".server-box");
    serverBox.querySelectorAll('input[name="channel_ids"]')
    .forEach(c => c.checked = true);
}

function clearServer(button){
    const serverBox = button.closest(".server-box");
    serverBox.querySelectorAll('input[name="channel_ids"]')
    .forEach(c => c.checked = false);
}
</script>

</body>
</html>
